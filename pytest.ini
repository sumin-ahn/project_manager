[pytest]
# An unregistered marker (a typo'd / renamed shipping·release, etc.) becomes a
# collection ERROR instead of a silent deselect — guards the marker-rename risk
# class (T-0159). We use filterwarnings (not `addopts = --strict-markers`)
# because in pytest 9.x `--strict-markers` placed in addopts is a NO-OP for
# enforcement (it only warns; the flag enforces only on the literal command
# line). filterwarnings reliably escalates from the ini. -m <expr> selection
# syntax is unaffected; registered markers below never warn, so never error.
filterwarnings =
    error::pytest.PytestUnknownMarkWarning
# Live (real-LLM) test markers — subset isolation for the 3-tier harness gate
# (spike: harness-test-two-level-gate). Default skip stays via the per-test
# PM_ORCH_LIVE + shutil.which(...) skipif; these markers only let a runner
# select a subset (e.g. `pytest -m shipping`) without firing every live test.
markers =
    shipping: 출하 테스트 — handoff durable shipping gate (real LLM · doc operability · PM_ORCH_LIVE).
    release: 릴리즈 테스트 — user-triggered release dogfood (real LLM · full wave · PM_ORCH_LIVE).
