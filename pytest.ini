[pytest]
# Live (real-LLM) test markers — subset isolation for the 2-tier harness gate
# (spike: harness-test-two-level-gate). Default skip stays via the per-test
# PM_ORCH_LIVE + shutil.which(...) skipif; these markers only let a runner
# select a subset (e.g. `pytest -m live_gate`) without firing every live test.
markers =
    live_gate: A tier — handoff durable live gate (real LLM · doc operability · PM_ORCH_LIVE).
    live_full: C tier — user-triggered release dogfood (real LLM · full wave · PM_ORCH_LIVE).
